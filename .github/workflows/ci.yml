# ============================================================
# GitHub Actions CI/CD 流水线
#
# 触发条件：push 到 main 分支 或 PR 合并到 main
# 流程：
#   1. 代码规范检查（ESLint）
#   2. 构建前端
#   3. 构建 Docker 镜像
#   4. （可选）推送到镜像仓库
# ============================================================

name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 代码规范检查 ──
  lint:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint server (ESLint)
        run: cd server && npx eslint . --ext .js --max-warnings 0
        continue-on-error: true

      - name: Build client
        run: cd client && npm run build

  # ── Docker 镜像构建 ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build main app image
        run: docker build -t bp-filter-app:${{ github.sha }} .

      - name: Build doc-service image
        run: docker build -t bp-filter-doc:${{ github.sha }} ./doc-service

      # ── 推送到容器镜像仓库（生产环境启用）──
