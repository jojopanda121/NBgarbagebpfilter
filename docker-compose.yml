# ============================================================
# docker-compose.yml — GarbageBPFilter v3.0 多服务部署
#
# 服务列表：
#   1. app        — Node.js 后端 + React 前端（主服务）
#   2. doc-service — Python FastAPI 文档提取微服务
#   3. nginx      — 反向代理（生产环境，--profile production）
#
# ⚠️ 重要：数据持久化说明
#   ./data  → 容器内 /app/data（SQLite 数据库，宿主机直接可见、可备份）
#   ./logs  → 容器内 /app/logs（运行日志）
#   执行 docker-compose down 不会丢失任何数据。
#   ⚠️ 绝对不要执行 docker-compose down -v （-v 会删除所有数据卷！）
#
# 启动命令：
#   docker-compose up -d              # 后台启动所有服务
#   docker-compose up -d --build      # 重新构建并启动（不删除数据！）
#   docker-compose logs -f app        # 查看主服务日志
#   docker-compose down               # 停止并移除容器（数据保留在 ./data）
#   docker-compose down -v           # ❌ 危险！会删除所有数据！
#
# 部署到腾讯云：
#   1. 将代码上传到服务器
#   2. cp .env.example .env 并填写配置
#   3. docker-compose up -d --build
# ============================================================

services:
  # ── 主应用（Node.js 后端 + React 前端）──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bp-filter-app
    restart: always
    # H9: 默认仅绑定本地回环，避免越过 Nginx 直接暴露应用端口；
    # 如需直连测试，可通过 .env 中 APP_BIND_HOST=0.0.0.0 显式覆盖。
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${PORT:-3001}:3001"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DOC_SERVICE_URL=http://doc-service:8001
      - DB_PATH=/app/data/app.db
    volumes:
      - ./data:/app/data        # 数据库持久化（宿主机直接可见，易于备份）
      - ./logs:/app/logs        # 日志持久化
    depends_on:
      doc-service:
        condition: service_healthy
    healthcheck:
      # M17: 改用 wget，兼容 Node 18+ 之前版本 / 不依赖 fetch 全局 API
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 文档提取微服务（Python FastAPI）──
  doc-service:
    build:
      context: ./doc-service
      dockerfile: Dockerfile
    container_name: bp-filter-doc
    restart: always
    expose:
      - "8001"
    # M15: 为 doc-service 增加资源限制，避免大 PDF 解析吃光宿主机内存
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx 反向代理（生产环境，可选）──
  nginx:
    image: nginx:alpine
    container_name: bp-filter-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-certs:/etc/nginx/certs:ro  # SSL 证书目录（bind mount，方便管理）
    depends_on:
      - app
    profiles:
      - production   # 仅在 --profile production 时启动

  # ── 数据库定时备份（每天凌晨3点） ──
  # M16: 备份脚本加 set -euo pipefail 与产物大小校验，失败可在日志中明确发现
  backup:
    build:
      context: .
      dockerfile_inline: |
        FROM alpine:3.19
        RUN apk add --no-cache sqlite
    container_name: bp-filter-backup
    restart: always
    volumes:
      - ./data:/data
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > /usr/local/bin/do-backup.sh <<'BACKUP'
        #!/bin/sh
        set -eu
        TS=$$(date +%Y%m%d_%H%M%S)
        OUT="/data/backups/app_$${TS}.db"
        mkdir -p /data/backups
        if ! sqlite3 /data/app.db ".backup $${OUT}"; then
          echo "[BACKUP][ERR] sqlite .backup failed at $${TS}" >&2
          exit 1
        fi
        SZ=$$(stat -c%s "$${OUT}" 2>/dev/null || echo 0)
        if [ "$${SZ}" -lt 1024 ]; then
          echo "[BACKUP][ERR] backup file too small ($${SZ} bytes) at $${TS}" >&2
          rm -f "$${OUT}"
          exit 2
        fi
        find /data/backups -name '*.db' -mtime +30 -delete
        echo "[BACKUP][OK] $${OUT} ($${SZ} bytes)"
        BACKUP
        chmod +x /usr/local/bin/do-backup.sh && \
        echo "0 3 * * * /usr/local/bin/do-backup.sh >> /data/backups/backup.log 2>&1" | crontab - && \
        mkdir -p /data/backups && \
        crond -f -l 2
    profiles:
      - production
