# ============================================================
# nginx.conf — GarbageBPFilter v3.0 Docker Compose 反向代理
# 用于 docker-compose --profile production 模式
#
# HTTPS 启用方式：
#   1. 将证书放到 ./nginx-certs/ 目录（fullchain.pem + privkey.pem）
#   2. 在 .env 中设置 DOMAIN=your-domain.com
#   3. 在 docker-compose.yml 中取消 nginx-ssl profile 的注释
#   4. docker-compose --profile production up -d
# ============================================================

upstream app {
    server app:3001;
}

# 上传文件大小限制
client_max_body_size 100m;
client_body_timeout 120s;

# ── HTTP 服务（默认） ──
server {
    listen 80;
    server_name _;

    # API 请求转发到 Node.js 后端
    location /api/ {
        proxy_pass http://app;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     200s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # 前端静态资源
    location / {
        proxy_pass http://app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查
    location /health {
        access_log off;
        proxy_pass http://app/api/health;
    }
}

# ── HTTPS 配置说明 ──
# 如需启用 HTTPS，请使用 nginx-ssl.conf：
#   1. 将证书放到 ./nginx-certs/fullchain.pem 和 ./nginx-certs/privkey.pem
#   2. 修改 docker-compose.yml 中 nginx volumes 挂载 nginx-ssl.conf
#   3. docker-compose --profile production up -d
